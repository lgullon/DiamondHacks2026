<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Intake Form — Riverside Medical Center</title>
  <style>
    body {
      font-family: Georgia, serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 24px 60px;
      color: #1a1a1a;
      background: #f9f9f9;
    }
    h1 { font-size: 22px; color: #1a3c5e; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #666; margin-bottom: 32px; }
    .section {
      background: white;
      border: 1px solid #dde3ea;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .section h2 {
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #1a3c5e;
      margin: 0 0 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
    }
    .field { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 6px;
      color: #333;
    }
    .hint {
      font-size: 12px;
      font-weight: normal;
      color: #888;
      margin-left: 6px;
    }
    input[type="text"],
    input[type="date"],
    input[type="tel"],
    textarea,
    select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
      box-sizing: border-box;
    }
    textarea { resize: vertical; min-height: 90px; }
    .radio-group, .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 4px;
    }
    .radio-group label, .checkbox-group label {
      font-weight: normal;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .row { display: flex; gap: 16px; }
    .row .field { flex: 1; }
    button[type="submit"] {
      display: block;
      margin: 0 auto;
      padding: 12px 40px;
      background: #1a3c5e;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Patient Intake Form</h1>
  <p class="subtitle">Riverside Medical Center — Please complete all fields prior to your appointment.</p>

  <form id="patient-form">

    <!-- SECTION 1: Personal Info -->
    <div class="section">
      <h2>Personal Information</h2>

      <div class="row">
        <div class="field">
          <label for="first-name">First Name</label>
          <input type="text" id="first-name" name="first-name" placeholder="e.g. Maria" />
        </div>
        <div class="field">
          <label for="last-name">Last Name</label>
          <input type="text" id="last-name" name="last-name" placeholder="e.g. Garcia" />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="dob">Date of Birth</label>
          <input type="date" id="dob" name="dob" />
        </div>
        <div class="field">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="e.g. (555) 000-1234" />
        </div>
      </div>

      <div class="field">
        <label for="language">Preferred Language</label>
        <select id="language" name="language">
          <option value="">— Select —</option>
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="zh">Chinese (Mandarin)</option>
          <option value="vi">Vietnamese</option>
          <option value="tl">Tagalog</option>
        </select>
      </div>
    </div>

    <!-- SECTION 2: Insurance -->
    <div class="section">
      <h2>Insurance &amp; Coverage</h2>

      <div class="field">
        <label for="insurance-type">
          Insurance Plan Type
          <span class="hint">(not sure? ask your provider)</span>
        </label>
        <select id="insurance-type" name="insurance-type">
          <option value="">— Select —</option>
          <option value="hmo">HMO (Health Maintenance Organization)</option>
          <option value="ppo">PPO (Preferred Provider Organization)</option>
          <option value="epo">EPO (Exclusive Provider Organization)</option>
          <option value="medicaid">Medicaid</option>
          <option value="medicare">Medicare</option>
          <option value="none">No insurance / Self-pay</option>
        </select>
      </div>

      <div class="field">
        <label for="insurance-id">Member ID / Policy Number</label>
        <input type="text" id="insurance-id" name="insurance-id" placeholder="Found on your insurance card" />
      </div>

      <div class="field">
        <label>
          Is this your primary insurance?
          <span class="hint">(primary = the one billed first)</span>
        </label>
        <div class="radio-group">
          <label><input type="radio" name="primary-insurance" value="yes" /> Yes</label>
          <label><input type="radio" name="primary-insurance" value="no" /> No, I have additional coverage</label>
          <label><input type="radio" name="primary-insurance" value="unsure" /> I'm not sure</label>
        </div>
      </div>
    </div>

    <!-- SECTION 3: Medical History -->
    <div class="section">
      <h2>Medical History</h2>

      <div class="field">
        <label>
          Do you have any of the following pre-existing conditions?
          <span class="hint">(select all that apply)</span>
        </label>
        <div class="checkbox-group">
          <label><input type="checkbox" name="conditions" value="diabetes" /> Diabetes (Type 1 or 2)</label>
          <label><input type="checkbox" name="conditions" value="hypertension" /> Hypertension (high blood pressure)</label>
          <label><input type="checkbox" name="conditions" value="asthma" /> Asthma or chronic respiratory condition</label>
          <label><input type="checkbox" name="conditions" value="heart" /> Cardiovascular disease</label>
          <label><input type="checkbox" name="conditions" value="none" /> None of the above</label>
        </div>
      </div>

      <div class="field">
        <label>
          Have you been hospitalized or had an inpatient procedure in the last 24 months?
        </label>
        <div class="radio-group">
          <label><input type="radio" name="hospitalized" value="yes" /> Yes</label>
          <label><input type="radio" name="hospitalized" value="no" /> No</label>
        </div>
      </div>

      <div class="field">
        <label for="current-medications">
          List any medications you are currently taking
          <span class="hint">(include dosage if known)</span>
        </label>
        <textarea id="current-medications" name="current-medications" placeholder="e.g. Metformin 500mg, Lisinopril 10mg — or write 'None'"></textarea>
      </div>

      <div class="field">
        <label for="allergies">
          Do you have any known drug allergies or adverse reactions to anesthesia?
        </label>
        <textarea id="allergies" name="allergies" placeholder="e.g. Penicillin causes rash — or write 'None known'"></textarea>
      </div>
    </div>

    <!-- SECTION 4: Current Visit -->
    <div class="section">
      <h2>Reason for Visit</h2>

      <div class="field">
        <label for="visit-reason">
          Chief complaint
          <span class="hint">(describe your main symptom or reason for today's visit)</span>
        </label>
        <textarea id="visit-reason" name="visit-reason" placeholder="e.g. Persistent lower back pain for 2 weeks, worsens when sitting"></textarea>
      </div>

      <div class="field">
        <label for="pain-level">
          Current pain level
        </label>
        <select id="pain-level" name="pain-level">
          <option value="">— Select —</option>
          <option value="0">0 — No pain</option>
          <option value="1-3">1–3 — Mild, manageable</option>
          <option value="4-6">4–6 — Moderate, affecting daily activities</option>
          <option value="7-9">7–9 — Severe, hard to ignore</option>
          <option value="10">10 — Worst pain imaginable</option>
        </select>
      </div>

      <div class="field">
        <label>
          Have you seen another provider for this issue before coming here?
        </label>
        <div class="radio-group">
          <label><input type="radio" name="prior-provider" value="yes" /> Yes</label>
          <label><input type="radio" name="prior-provider" value="no" /> No, this is my first visit for this</label>
        </div>
      </div>
    </div>

    <button type="submit">Submit Form</button>

  </form>

</body>
</html>
